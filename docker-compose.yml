services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: servicehub_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - servicehub
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: servicehub_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - servicehub
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: servicehub_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-servicehub}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-servicehub}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - servicehub

  redis:
    image: redis:7.4-alpine
    container_name: servicehub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - servicehub

  node:
    image: node:22-alpine
    container_name: servicehub_node
    working_dir: /var/www/front
    volumes:
      - .:/var/www
      - node_modules:/var/www/front/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - servicehub
    profiles:
      - dev

networks:
  servicehub:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  node_modules:
